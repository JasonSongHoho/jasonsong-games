<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="900" viewBox="0 0 1120 900" role="img" aria-labelledby="title desc">
  <title id="title">Slay the Spire 2 seed and RNG flow</title>
  <desc id="desc">A flow chart showing one string seed branching into run-level and player-level RNG streams, each storing seed and counter values.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .text { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; }
      .small { font-size: 16px; fill: #334155; }
      .title { font-size: 26px; font-weight: 700; }
      .box { stroke: #475569; stroke-width: 2; rx: 18; ry: 18; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="900"/>

  <rect class="box" x="385" y="32" width="350" height="72" fill="#f8fafc"/>
  <text class="text title" x="560" y="62" text-anchor="middle">StringSeed</text>
  <text class="text small" x="560" y="88" text-anchor="middle">玩家看到和分享的字符串种子</text>

  <path class="line" d="M560 104 L560 146"/>
  <rect class="box" x="370" y="146" width="380" height="76" fill="#f1f5f9"/>
  <text class="text title" x="560" y="178" text-anchor="middle">DeterministicHash(seed)</text>
  <text class="text small" x="560" y="204" text-anchor="middle">转成稳定整数种子，供派生流使用</text>

  <path class="line" d="M560 222 C560 260 300 260 300 302"/>
  <path class="line" d="M560 222 C560 260 820 260 820 302"/>

  <rect class="box" x="80" y="302" width="440" height="94" fill="#e0f2fe"/>
  <text class="text title" x="300" y="336" text-anchor="middle">RunRngSet</text>
  <text class="text small" x="300" y="365" text-anchor="middle">Run 级随机流：同一局共享</text>

  <rect class="box" x="600" y="302" width="440" height="94" fill="#ffe4e6"/>
  <text class="text title" x="820" y="336" text-anchor="middle">PlayerRngSet</text>
  <text class="text small" x="820" y="365" text-anchor="middle">玩家级随机流：seed hash + NetId</text>

  <path class="line" d="M300 396 L300 438"/>
  <path class="line" d="M820 396 L820 438"/>

  <rect class="box" x="54" y="438" width="220" height="78" fill="#dbeafe"/>
  <text class="text" x="164" y="468" text-anchor="middle">act_N_map</text>
  <text class="text small" x="164" y="494" text-anchor="middle">当前幕地图</text>

  <rect class="box" x="300" y="438" width="220" height="78" fill="#dcfce7"/>
  <text class="text" x="410" y="468" text-anchor="middle">Shuffle</text>
  <text class="text small" x="410" y="494" text-anchor="middle">洗牌 / 抽牌堆</text>

  <rect class="box" x="54" y="544" width="220" height="78" fill="#fef3c7"/>
  <text class="text" x="164" y="574" text-anchor="middle">UnknownMapPoint</text>
  <text class="text small" x="164" y="600" text-anchor="middle">问号房与 odds</text>

  <rect class="box" x="300" y="544" width="220" height="78" fill="#fce7f3"/>
  <text class="text" x="410" y="574" text-anchor="middle">MonsterAi / Combat*</text>
  <text class="text small" x="410" y="600" text-anchor="middle">怪物行动 / 战斗随机</text>

  <rect class="box" x="177" y="650" width="220" height="78" fill="#ede9fe"/>
  <text class="text" x="287" y="680" text-anchor="middle">UpFront / Treasure</text>
  <text class="text small" x="287" y="706" text-anchor="middle">前置池 / 宝箱遗物</text>

  <rect class="box" x="590" y="438" width="220" height="78" fill="#fee2e2"/>
  <text class="text" x="700" y="468" text-anchor="middle">Rewards</text>
  <text class="text small" x="700" y="494" text-anchor="middle">奖励卡 / 遗物 / 事件</text>

  <rect class="box" x="830" y="438" width="220" height="78" fill="#ffedd5"/>
  <text class="text" x="940" y="468" text-anchor="middle">Shops</text>
  <text class="text small" x="940" y="494" text-anchor="middle">商店商品 / 价格</text>

  <rect class="box" x="710" y="544" width="220" height="78" fill="#fae8ff"/>
  <text class="text" x="820" y="574" text-anchor="middle">Transformations</text>
  <text class="text small" x="820" y="600" text-anchor="middle">卡牌变化</text>

  <path class="line dash" d="M300 396 C300 424 164 418 164 438"/>
  <path class="line dash" d="M300 396 C300 424 410 418 410 438"/>
  <path class="line dash" d="M300 396 C300 512 164 522 164 544"/>
  <path class="line dash" d="M300 396 C300 512 410 522 410 544"/>
  <path class="line dash" d="M300 396 C300 616 287 626 287 650"/>

  <path class="line dash" d="M820 396 C820 424 700 418 700 438"/>
  <path class="line dash" d="M820 396 C820 424 940 418 940 438"/>
  <path class="line dash" d="M820 396 L820 544"/>

  <path class="line" d="M560 730 L560 762"/>
  <rect class="box" x="270" y="762" width="580" height="76" fill="#ecfccb"/>
  <text class="text title" x="560" y="794" text-anchor="middle">每条 RNG 保存 Seed + Counter</text>
  <text class="text small" x="560" y="820" text-anchor="middle">NextInt / NextFloat / Shuffle 会推进对应流的 Counter</text>

  <path class="line" d="M560 838 L560 864"/>
  <rect class="box" x="234" y="864" width="652" height="28" fill="#f8fafc"/>
  <text class="text small" x="560" y="884" text-anchor="middle">最终结果 = 当前状态 + 候选池 + RNG 流 + Counter</text>
</svg>
