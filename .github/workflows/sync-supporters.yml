name: Sync supporters data

on:
  workflow_dispatch:
  schedule:
    - cron: '17,47 * * * *'

permissions:
  contents: write

concurrency:
  group: supporters-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Afdian supporters
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_API_TOKEN: ${{ secrets.AFDIAN_API_TOKEN }}
          AFDIAN_API_BASE: ${{ vars.AFDIAN_API_BASE || 'https://ifdian.net' }}
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto'
          import { mkdir, readFile, writeFile } from 'node:fs/promises'

          const outputPath = 'data/supporters.generated.json'
          const apiBase = process.env.AFDIAN_API_BASE || 'https://ifdian.net'
          const userId = process.env.AFDIAN_USER_ID
          const apiToken = process.env.AFDIAN_API_TOKEN

          function md5(value) {
            return createHash('md5').update(value).digest('hex')
          }

          function signPayload(payload) {
            const keys = Object.keys(payload).sort()
            const raw = keys.map((key) => `${key}${payload[key]}`).join('')
            return md5(`${apiToken}${raw}`)
          }

          function createBody(params) {
            const body = {
              user_id: userId,
              params: JSON.stringify(params),
              ts: Math.floor(Date.now() / 1000)
            }
            return {
              ...body,
              sign: signPayload(body)
            }
          }

          async function postAfdian(endpoint, params = {}) {
            const response = await fetch(`${apiBase}${endpoint}`, {
              method: 'POST',
              headers: {
                'content-type': 'application/json'
              },
              body: JSON.stringify(createBody(params))
            })

            if (!response.ok) {
              throw new Error(`${endpoint} returned HTTP ${response.status}`)
            }

            const payload = await response.json()
            if (payload.ec !== 200) {
              throw new Error(`${endpoint} returned ec=${payload.ec}: ${payload.em ?? 'unknown error'}`)
            }
            return payload.data
          }

          function normalizeDate(value) {
            if (!value) return null
            const time = Number(value)
            if (!Number.isFinite(time) || time <= 0) return null
            return new Date(time * 1000).toISOString().slice(0, 10)
          }

          function getSupporterId(item) {
            return item?.user?.user_id ?? item?.user?.user_private_id ?? item?.user_id ?? item?.user_private_id
          }

          function normalizeSupporter(item) {
            const id = String(getSupporterId(item) ?? '').trim()
            const user = item.user ?? {}
            return {
              id,
              name: String(user.name ?? item.name ?? '爱发电支持者').trim(),
              avatar: String(user.avatar ?? item.avatar ?? '').trim(),
              platform: '爱发电',
              amount: item.all_sum_amount == null ? null : Number(item.all_sum_amount),
              firstPayTime: normalizeDate(item.create_time),
              lastPayTime: normalizeDate(item.last_pay_time)
            }
          }

          function sortByLastPayTimeDesc(supporters) {
            return supporters.toSorted((a, b) => {
              const aTime = Date.parse(a.lastPayTime ?? a.firstPayTime ?? '1970-01-01')
              const bTime = Date.parse(b.lastPayTime ?? b.firstPayTime ?? '1970-01-01')
              return bTime - aTime
            })
          }

          async function readExistingManualSupporters() {
            try {
              const data = JSON.parse(await readFile(outputPath, 'utf8'))
              return (data.supporters ?? []).filter((supporter) => supporter.platform !== '爱发电')
            } catch {
              return []
            }
          }

          async function fetchAllSupporters() {
            const supporters = []
            let page = 1
            let totalPage = 1

            do {
              const data = await postAfdian('/api/open/query-sponsor', { page })
              supporters.push(...(data?.list ?? []))
              totalPage = Number(data?.total_page ?? page)
              page += 1
            } while (page <= totalPage)

            return supporters
          }

          if (!userId || !apiToken) {
            throw new Error('AFDIAN_USER_ID and AFDIAN_API_TOKEN secrets are required.')
          }

          await postAfdian('/api/open/ping', { ping: 'supporters-fetch' })
          const manualSupporters = await readExistingManualSupporters()
          const rawSupporters = await fetchAllSupporters()
          const afdianSupporters = rawSupporters.map(normalizeSupporter).filter((supporter) => supporter.id)
          const supporters = sortByLastPayTimeDesc([...manualSupporters, ...afdianSupporters])

          await mkdir('data', { recursive: true })
          await writeFile(
            outputPath,
            `${JSON.stringify(
              {
                source: 'afdian+manual',
                updatedAt: new Date().toISOString(),
                total: supporters.length,
                supporters
              },
              null,
              2
            )}\n`
          )

          console.log(`Wrote ${supporters.length} supporters to ${outputPath}`)
          NODE

      - name: Commit supporters data
        run: |
          if git diff --quiet -- data/supporters.generated.json; then
            echo "No supporters data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/supporters.generated.json
          git commit -m "Update supporters data"
          git push
